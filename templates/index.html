<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Support Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .chat-container {
            padding: 30px;
            min-height: 400px;
        }
        
        .input-section {
            margin-bottom: 30px;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        input[type="text"] {
            flex: 1;
            padding: 15px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: #4facfe;
        }
        
        button {
            padding: 15px 25px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .response-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
            display: none;
        }
        
        .response-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .action-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            margin-right: 10px;
        }
        
        .action-solution {
            background: #d4edda;
            color: #155724;
        }
        
        .action-clarification {
            background: #fff3cd;
            color: #856404;
        }
        
        .action-escalation {
            background: #f8d7da;
            color: #721c24;
        }
        
        .confidence {
            font-size: 14px;
            color: #6c757d;
        }
        
        .response-text {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        
        .similar-tickets {
            border-top: 1px solid #dee2e6;
            padding-top: 20px;
        }
        
        .similar-tickets h4 {
            margin-bottom: 15px;
            color: #495057;
        }
        
        .ticket {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 4px solid #4facfe;
        }
        
        .ticket-title {
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .ticket-similarity {
            font-size: 12px;
            color: #6c757d;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #6c757d;
        }
        
        .examples {
            margin-top: 20px;
        }
        
        .examples h3 {
            margin-bottom: 15px;
            color: #495057;
        }
        
        .example-queries {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .example-query {
            background: #e9ecef;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        .example-query:hover {
            background: #dee2e6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 AI Support Assistant</h1>
            <p>Get instant help with your support queries using semantic search</p>
        </div>
        
        <div class="chat-container">
            <div class="input-section">
                <div class="input-group">
                    <input type="text" id="queryInput" placeholder="Describe your issue..." />
                    <button onclick="submitQuery()" id="submitBtn">Ask Assistant</button>
                </div>
            </div>
            
            <div class="examples">
                <h3>Try these example queries:</h3>
                <div class="example-queries">
                    <span class="example-query" onclick="setQuery('I cannot login to my account')">Login Issues</span>
                    <span class="example-query" onclick="setQuery('My payment was declined')">Payment Problems</span>
                    <span class="example-query" onclick="setQuery('The app keeps crashing')">App Crashes</span>
                    <span class="example-query" onclick="setQuery('Website is loading slowly')">Performance Issues</span>
                    <span class="example-query" onclick="setQuery('Not receiving email notifications')">Email Issues</span>
                </div>
            </div>
            
            <div id="responseSection" class="response-section">
                <div class="response-header">
                    <span id="actionBadge" class="action-badge"></span>
                    <span id="confidence" class="confidence"></span>
                </div>
                <div id="responseText" class="response-text"></div>
                <div id="similarTickets" class="similar-tickets"></div>
            </div>
            
            <div id="loading" class="loading" style="display: none;">
                <p>🔍 Searching for similar issues...</p>
            </div>
        </div>
    </div>

    <script>
        function setQuery(query) {
            document.getElementById('queryInput').value = query;
        }
        
        function submitQuery() {
            const query = document.getElementById('queryInput').value.trim();
            if (!query) {
                alert('Please enter a query');
                return;
            }
            
            const submitBtn = document.getElementById('submitBtn');
            const loading = document.getElementById('loading');
            const responseSection = document.getElementById('responseSection');
            
            // Show loading
            submitBtn.disabled = true;
            submitBtn.textContent = 'Processing...';
            loading.style.display = 'block';
            responseSection.style.display = 'none';
            
            // Make API call
            fetch('/api/v1/query', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    query: query,
                    max_results: 3
                })
            })
            .then(response => response.json())
            .then(data => {
                displayResponse(data);
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Error processing query. Please try again.');
            })
            .finally(() => {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Ask Assistant';
                loading.style.display = 'none';
            });
        }
        
        function displayResponse(data) {
            const responseSection = document.getElementById('responseSection');
            const actionBadge = document.getElementById('actionBadge');
            const confidence = document.getElementById('confidence');
            const responseText = document.getElementById('responseText');
            const similarTickets = document.getElementById('similarTickets');
            
            // Set action badge
            actionBadge.textContent = data.action;
            actionBadge.className = `action-badge action-${data.action}`;
            
            // Set confidence
            confidence.textContent = `Confidence: ${(data.confidence * 100).toFixed(0)}%`;
            
            // Set response text
            responseText.textContent = data.response;
            
            // Display similar tickets
            if (data.similar_tickets && data.similar_tickets.length > 0) {
                let ticketsHtml = '<h4>Similar Past Issues:</h4>';
                data.similar_tickets.forEach(ticket => {
                    const metadata = ticket.metadata || {};
                    ticketsHtml += `
                        <div class="ticket">
                            <div class="ticket-title">${metadata.title || 'Untitled'}</div>
                            <div>${metadata.description || 'No description'}</div>
                            <div class="ticket-similarity">Similarity: ${(ticket.score * 100).toFixed(0)}%</div>
                        </div>
                    `;
                });
                similarTickets.innerHTML = ticketsHtml;
            } else {
                similarTickets.innerHTML = '';
            }
            
            responseSection.style.display = 'block';
        }
        
        // Allow Enter key to submit
        document.getElementById('queryInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                submitQuery();
            }
        });
    </script>
</body>
</html>
